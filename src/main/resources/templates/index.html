<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout :: html}" 
      th:with="title='AI Chat'">
<body>
<div th:fragment="content" x-data="chatApp()" x-cloak class="flex h-screen">
    
    <!-- Sidebar -->
    <aside class="w-64 bg-gray-900 text-white flex flex-col">
        <!-- Header -->
        <div class="p-4 border-b border-gray-700">
            <h1 class="text-xl font-bold">AI Chat</h1>
        </div>
        
        <!-- New Chat Button -->
        <div class="p-4">
            <button @click="createSession()" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded-lg flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
                New Chat
            </button>
        </div>
        
        <!-- Session List -->
        <div class="flex-1 overflow-y-auto">
            <template x-for="session in sessions" :key="session.id">
                <div @click="selectSession(session.id)" 
                     :class="{'bg-gray-700': currentSessionId === session.id}"
                     class="p-3 mx-2 my-1 rounded-lg cursor-pointer hover:bg-gray-700 transition-colors group">
                    <div class="flex items-center justify-between">
                        <div class="font-medium truncate flex-1" x-text="session.name"></div>
                        <button @click.stop="deleteSession(session.id)" 
                                class="opacity-0 group-hover:opacity-100 text-gray-400 hover:text-red-400">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                        </button>
                    </div>
                    <div class="text-xs text-gray-400" x-text="formatDate(session.lastActivityAt)"></div>
                </div>
            </template>
        </div>
        
        <!-- Settings Link -->
        <div class="p-4 border-t border-gray-700">
            <a href="/settings" class="w-full text-gray-400 hover:text-white py-2 flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                          d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
                Settings
            </a>
        </div>
    </aside>
    
    <!-- Main Content -->
    <main class="flex-1 flex flex-col bg-white">
        <!-- Chat Header -->
        <header class="h-16 border-b flex items-center justify-between px-6">
            <div class="flex items-center gap-4">
                <h2 class="text-lg font-semibold" x-text="currentSession?.name || 'Select a chat'"></h2>
            </div>
            <div class="flex items-center gap-4">
                <!-- Model Selector (grouped by brand) -->
                <select x-model="selectedModel" 
                        @change="switchModel()"
                        x-effect="
                            let html = '';
                            if (groupedModels && groupedModels.length > 0) {
                                for (const group of groupedModels) {
                                    html += '<optgroup label=&quot;' + group.brandName + '&quot;>';
                                    for (const model of group.models) {
                                        const val = model.provider + ':' + model.id;
                                        const sel = val === selectedModel ? ' selected' : '';
                                        html += '<option value=&quot;' + val + '&quot;' + sel + '>' + model.name + '</option>';
                                    }
                                    html += '</optgroup>';
                                }
                            } else {
                                for (const model of models) {
                                    const sel = model.id === selectedModel ? ' selected' : '';
                                    html += '<option value=&quot;' + model.id + '&quot;' + sel + '>' + model.name + '</option>';
                                }
                            }
                            $el.innerHTML = html;
                        "
                        class="border rounded-lg px-3 py-2 text-sm">
                </select>
                
                <!-- Context Usage -->
                <div class="flex items-center gap-2 text-sm text-gray-500">
                    <span x-text="contextUsage.currentTokens + '/' + contextUsage.contextWindow"></span>
                    <div class="w-24 h-2 bg-gray-200 rounded-full overflow-hidden">
                        <div class="h-full bg-blue-500 transition-all" 
                             :class="{'bg-yellow-500': contextUsage.usagePercent > 60, 'bg-red-500': contextUsage.usagePercent > 80}"
                             :style="'width: ' + contextUsage.usagePercent + '%'"></div>
                    </div>
                </div>
            </div>
        </header>
        
        <!-- Messages Area -->
        <div class="flex-1 overflow-y-auto p-6" id="messages-container">
            <template x-for="message in messages" :key="message.id">
                <div :class="message.role === 'user' ? 'justify-end' : 'justify-start'" class="flex mb-4">
                    <div :class="message.role === 'user' ? 'bg-blue-500 text-white' : 'bg-gray-100'" 
                         class="max-w-3xl rounded-lg px-4 py-3">
                        <div x-html="renderMarkdown(message.content)"></div>
                    </div>
                </div>
            </template>
            
            <!-- Streaming Response -->
            <div x-show="isStreaming" class="flex justify-start mb-4">
                <div class="bg-gray-100 max-w-3xl rounded-lg px-4 py-3">
                    <!-- Tool Calls Display -->
                    <template x-if="hasActiveToolCalls()">
                        <div class="mb-3 space-y-2">
                            <template x-for="toolCall in getToolCallsArray()" :key="toolCall.id">
                                <div class="tool-call-container border rounded-lg overflow-hidden"
                                     :class="toolCall.isError ? 'border-red-300' : 'border-gray-300'">
                                    <!-- Tool Call Header -->
                                    <div class="tool-call-header flex items-center justify-between px-3 py-2 cursor-pointer"
                                         :class="toolCall.isError ? 'bg-red-100' : 'bg-gray-200'"
                                         @click="toggleToolCallExpand(toolCall.id)">
                                        <div class="flex items-center gap-2">
                                            <!-- Status Icon -->
                                            <template x-if="toolCall.status === 'running'">
                                                <div class="tool-call-spinner w-4 h-4 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                                            </template>
                                            <template x-if="toolCall.status === 'completed'">
                                                <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                                                </svg>
                                            </template>
                                            <template x-if="toolCall.status === 'error'">
                                                <svg class="w-4 h-4 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                                </svg>
                                            </template>
                                            <!-- Tool Name -->
                                            <span class="font-medium text-sm" 
                                                  :class="toolCall.isError ? 'text-red-700' : 'text-gray-700'"
                                                  x-text="'Tool: ' + toolCall.toolName"></span>
                                            <!-- Status Badge -->
                                            <span x-show="toolCall.status === 'running'" 
                                                  class="text-xs px-2 py-0.5 bg-blue-100 text-blue-700 rounded-full">Running</span>
                                            <span x-show="toolCall.status === 'completed'" 
                                                  class="text-xs px-2 py-0.5 bg-green-100 text-green-700 rounded-full">Completed</span>
                                            <span x-show="toolCall.status === 'error'" 
                                                  class="text-xs px-2 py-0.5 bg-red-100 text-red-700 rounded-full">Error</span>
                                        </div>
                                        <!-- Expand/Collapse Icon -->
                                        <svg class="w-4 h-4 transition-transform" 
                                             :class="[toolCall.expanded ? 'rotate-180' : '', toolCall.isError ? 'text-red-500' : 'text-gray-500']"
                                             fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                                        </svg>
                                    </div>
                                    <!-- Tool Call Result (Collapsible) -->
                                    <div x-show="toolCall.expanded && toolCall.result" 
                                         x-collapse
                                         class="tool-call-result px-3 py-2 border-t"
                                         :class="toolCall.isError ? 'bg-red-50 border-red-300' : 'bg-gray-50 border-gray-300'">
                                        <pre class="text-xs whitespace-pre-wrap overflow-x-auto max-h-48 overflow-y-auto"
                                             :class="toolCall.isError ? 'text-red-600' : 'text-gray-600'"
                                             x-text="toolCall.result"></pre>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>
                    <!-- Streaming Text Content -->
                    <div x-html="renderMarkdown(streamingContent)"></div>
                    <span class="inline-block w-2 h-4 bg-gray-400 animate-pulse ml-1"></span>
                </div>
            </div>
        </div>
        
        <!-- Input Area -->
        <div class="border-t p-4">
            <div class="max-w-4xl mx-auto flex gap-4">
                <textarea x-model="inputMessage" 
                          @keydown.enter.prevent="sendMessage()"
                          @keydown.ctrl.n.prevent="createSession()"
                          placeholder="Type your message..."
                          rows="3"
                          class="flex-1 border rounded-lg px-4 py-3 resize-none focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                <div class="flex flex-col gap-2">
                    <button @click="sendMessage()" 
                            :disabled="!inputMessage.trim() || isStreaming"
                            class="bg-blue-500 hover:bg-blue-600 disabled:bg-gray-300 text-white px-6 py-3 rounded-lg">
                        Send
                    </button>
                    <button x-show="isStreaming" 
                            @click="abortChat()"
                            class="bg-red-500 hover:bg-red-600 text-white px-6 py-3 rounded-lg">
                        Stop
                    </button>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
