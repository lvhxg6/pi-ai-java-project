<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout :: html}" 
      th:with="title='Settings - AI Chat'">
<body>
<div th:fragment="content" x-data="settingsApp()" x-cloak class="flex h-screen">
    
    <!-- Sidebar -->
    <aside class="w-64 bg-gray-900 text-white flex flex-col">
        <div class="p-4 border-b border-gray-700">
            <h1 class="text-xl font-bold">AI Chat</h1>
        </div>
        
        <div class="p-4">
            <a href="/" class="w-full bg-gray-700 hover:bg-gray-600 text-white py-2 px-4 rounded-lg flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                Back to Chat
            </a>
        </div>
        
        <nav class="flex-1 p-4">
            <a href="#brands" class="block py-2 px-4 rounded-lg bg-gray-700 text-white">
                Brands
            </a>
        </nav>
    </aside>
    
    <!-- Main Content: Brand Management Layout -->
    <div class="flex-1 flex brand-layout">
        
        <!-- Left: Brand List Sidebar -->
        <div class="brand-sidebar">
            <div class="p-4 border-b border-gray-200">
                <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wide">Model Brands</h3>
            </div>
            
            <div class="flex-1 overflow-y-auto p-2">
                <template x-for="brand in brands" :key="brand.id">
                    <div class="brand-list-item"
                         :class="{'selected': selectedBrandId === brand.id, 'disabled': !brand.enabled}"
                         @click="selectBrand(brand.id)">
                        <span class="brand-list-name" x-text="brand.name"></span>
                        <span class="badge" 
                              :class="brand.enabled ? 'badge-on' : 'badge-off'"
                              x-text="brand.enabled ? 'ON' : 'OFF'"></span>
                    </div>
                </template>
            </div>
            
            <!-- Add Custom Brand Button -->
            <div class="p-3 border-t border-gray-200">
                <button @click="showAddBrand = true" class="btn-add-brand">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                    Add Custom Brand
                </button>
            </div>
        </div>
        
        <!-- Right: Brand Config Panel -->
        <div class="brand-panel" x-show="selectedBrand">
            <!-- Message Banner -->
            <div x-show="message" x-transition
                 :class="messageType === 'success' ? 'bg-green-100 text-green-800 border-green-300' : 'bg-red-100 text-red-800 border-red-300'"
                 class="mb-4 p-3 rounded-lg border text-sm">
                <span x-text="message"></span>
            </div>
            
            <!-- Brand Header -->
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-bold" x-text="selectedBrand?.name"></h2>
                <span class="text-sm text-gray-500" x-text="selectedBrand?.builtin ? 'Built-in' : (selectedBrand?.deletable ? 'Custom' : 'Extension')"></span>
            </div>
            
            <!-- API Key -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">API Key</label>
                <div class="flex gap-2">
                    <input :type="showApiKey ? 'text' : 'password'" 
                           x-model="editApiKey"
                           placeholder="Enter API Key"
                           class="flex-1 border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <button @click="showApiKey = !showApiKey" 
                            class="px-3 py-2 border rounded-lg text-gray-600 hover:bg-gray-100"
                            x-text="showApiKey ? 'Hide' : 'Show'"></button>
                </div>
                <p class="text-xs text-gray-400 mt-1" x-show="selectedBrand?.hasApiKey">
                    Current: <span x-text="selectedBrand?.maskedApiKey"></span>
                </p>
            </div>
            
            <!-- Base URL -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Base URL</label>
                <input type="text" x-model="editBaseUrl"
                       :placeholder="selectedBrand?.defaultBaseUrl || 'Enter Base URL'"
                       class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <!-- Enable/Disable Toggle -->
            <div class="mb-6">
                <label class="toggle-switch">
                    <input type="checkbox" x-model="editEnabled" @change="toggleEnabled(selectedBrand.id, editEnabled)">
                    <span class="toggle-slider"></span>
                    <span class="ml-3 text-sm font-medium text-gray-700" x-text="editEnabled ? 'Enabled' : 'Disabled'"></span>
                </label>
            </div>
            
            <!-- Save Button -->
            <div class="mb-8">
                <button @click="saveBrand()" 
                        :disabled="loading"
                        class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-lg disabled:opacity-50">
                    <span x-show="!loading">Save Configuration</span>
                    <span x-show="loading">Saving...</span>
                </button>
            </div>
            
            <!-- Models Section -->
            <div class="border-t pt-6">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-semibold">Models</h3>
                    <button @click="showAddModel = !showAddModel" 
                            class="text-sm bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1.5 rounded-lg flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                        </svg>
                        Add Model
                    </button>
                </div>
                
                <!-- Add Model Form -->
                <div x-show="showAddModel" x-transition class="bg-gray-50 rounded-lg p-4 mb-4 border">
                    <div class="grid grid-cols-2 gap-3 mb-3">
                        <div>
                            <label class="block text-xs font-medium text-gray-600 mb-1">Model ID</label>
                            <input type="text" x-model="newModelId" placeholder="e.g. gpt-4o"
                                   class="w-full border rounded px-2 py-1.5 text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-600 mb-1">Display Name</label>
                            <input type="text" x-model="newModelName" placeholder="e.g. GPT-4o"
                                   class="w-full border rounded px-2 py-1.5 text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-600 mb-1">Context Window</label>
                            <input type="number" x-model.number="newModelContextWindow" placeholder="128000"
                                   class="w-full border rounded px-2 py-1.5 text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-600 mb-1">Max Tokens</label>
                            <input type="number" x-model.number="newModelMaxTokens" placeholder="4096"
                                   class="w-full border rounded px-2 py-1.5 text-sm">
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button @click="addModel()" class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1.5 rounded text-sm">Add</button>
                        <button @click="showAddModel = false" class="text-gray-500 hover:text-gray-700 px-3 py-1.5 text-sm">Cancel</button>
                    </div>
                </div>
                
                <!-- Model List -->
                <div class="model-list">
                    <template x-for="model in (selectedBrand?.models || [])" :key="model.id">
                        <div class="model-item" :class="model.custom ? 'custom' : 'preset'">
                            <div class="flex-1">
                                <div class="flex items-center gap-2">
                                    <span class="font-medium text-sm" x-text="model.name"></span>
                                    <span class="text-xs px-1.5 py-0.5 rounded"
                                          :class="model.custom ? 'bg-blue-100 text-blue-700' : 'bg-gray-100 text-gray-600'"
                                          x-text="model.custom ? 'Custom' : 'Preset'"></span>
                                </div>
                                <div class="text-xs text-gray-500 mt-0.5">
                                    <span x-text="'Context: ' + (model.contextWindow >= 1000 ? Math.round(model.contextWindow/1000) + 'K' : model.contextWindow)"></span>
                                    <span class="mx-1">·</span>
                                    <span x-text="'Max: ' + (model.maxTokens >= 1000 ? Math.round(model.maxTokens/1000) + 'K' : model.maxTokens)"></span>
                                </div>
                            </div>
                            <button x-show="model.custom" @click="removeModel(model.id)"
                                    class="text-red-400 hover:text-red-600 p-1">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                                </svg>
                            </button>
                        </div>
                    </template>
                </div>
            </div>
            
            <!-- Delete Brand Button (custom brands only) -->
            <div x-show="selectedBrand?.deletable" class="border-t mt-8 pt-6">
                <button @click="deleteCustomBrand(selectedBrand.id)" class="btn-delete-brand">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                    </svg>
                    Delete Brand
                </button>
            </div>
        </div>
        
        <!-- Empty State (no brand selected) -->
        <div class="brand-panel flex items-center justify-center" x-show="!selectedBrand">
            <div class="text-center text-gray-400">
                <svg class="w-16 h-16 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
                <p class="text-lg">Select a brand to configure</p>
            </div>
        </div>
    </div>
    
    <!-- Add Custom Brand Modal -->
    <div x-show="showAddBrand" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl p-6 w-full max-w-md" @click.away="showAddBrand = false">
            <h3 class="text-lg font-semibold mb-4">Add Custom Brand</h3>
            <form @submit.prevent="createCustomBrand()">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Brand Name</label>
                        <input type="text" x-model="newBrandName" required placeholder="e.g. My API Service"
                               class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Base URL</label>
                        <input type="text" x-model="newBrandBaseUrl" required placeholder="https://api.example.com"
                               class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">API Key</label>
                        <input type="password" x-model="newBrandApiKey" placeholder="Enter API Key"
                               class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                <div class="flex justify-end gap-3 mt-6">
                    <button type="button" @click="showAddBrand = false" class="px-4 py-2 text-gray-600 hover:text-gray-800">Cancel</button>
                    <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg">Create</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
