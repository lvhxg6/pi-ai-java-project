<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout :: html}" 
      th:with="title='Settings - AI Chat'">
<body>
<div th:fragment="content" x-data="settingsApp()" x-cloak class="flex h-screen">
    
    <!-- Sidebar -->
    <aside class="w-64 bg-gray-900 text-white flex flex-col">
        <div class="p-4 border-b border-gray-700">
            <h1 class="text-xl font-bold">AI Chat</h1>
        </div>
        
        <div class="p-4">
            <a href="/" class="w-full bg-gray-700 hover:bg-gray-600 text-white py-2 px-4 rounded-lg flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                Back to Chat
            </a>
        </div>
        
        <nav class="flex-1 p-4">
            <a href="#providers" class="block py-2 px-4 rounded-lg bg-gray-700 text-white">
                Providers
            </a>
        </nav>
    </aside>
    
    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto bg-gray-50 p-8">
        <div class="max-w-4xl mx-auto">
            <h2 class="text-2xl font-bold mb-6">Provider Configuration</h2>
            
            <!-- Add Provider Button -->
            <button @click="showAddForm = true" 
                    class="mb-6 bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
                Add Provider
            </button>
            
            <!-- Provider List -->
            <div class="space-y-4">
                <template x-for="provider in providers" :key="provider.id">
                    <div class="bg-white rounded-lg shadow p-6">
                        <div class="flex items-center justify-between mb-4">
                            <div class="flex items-center gap-3">
                                <h3 class="text-lg font-semibold" x-text="provider.name"></h3>
                                <span :class="provider.status === 'CONNECTED' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'"
                                      class="px-2 py-1 rounded-full text-xs font-medium"
                                      x-text="provider.status"></span>
                            </div>
                            <div class="flex items-center gap-2">
                                <button @click="editProvider(provider)" 
                                        class="text-gray-500 hover:text-blue-500">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                                    </svg>
                                </button>
                                <button @click="deleteProvider(provider.id)" 
                                        class="text-gray-500 hover:text-red-500">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <div class="text-sm text-gray-500">
                            <p>Provider ID: <span x-text="provider.providerId"></span></p>
                            <p>API Key: <span x-text="provider.maskedApiKey || '••••••••'"></span></p>
                        </div>
                    </div>
                </template>
            </div>
            
            <!-- Add/Edit Provider Modal -->
            <div x-show="showAddForm || editingProvider" 
                 class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                <div class="bg-white rounded-lg shadow-xl p-6 w-full max-w-md" @click.away="closeForm()">
                    <h3 class="text-lg font-semibold mb-4" x-text="editingProvider ? 'Edit Provider' : 'Add Provider'"></h3>
                    
                    <form @submit.prevent="saveProvider()">
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                                <input type="text" x-model="formData.name" required
                                       class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Provider</label>
                                <select x-model="formData.providerId" required
                                        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                                    <option value="">Select a provider</option>
                                    <option value="anthropic">Anthropic</option>
                                    <option value="openai">OpenAI</option>
                                    <option value="google">Google</option>
                                    <option value="mistral">Mistral</option>
                                    <option value="bedrock">AWS Bedrock</option>
                                </select>
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">API Key</label>
                                <input type="password" x-model="formData.apiKey" 
                                       :placeholder="editingProvider ? 'Leave blank to keep current' : 'Enter API key'"
                                       class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            </div>
                        </div>
                        
                        <div class="flex justify-end gap-3 mt-6">
                            <button type="button" @click="closeForm()" 
                                    class="px-4 py-2 text-gray-600 hover:text-gray-800">
                                Cancel
                            </button>
                            <button type="submit" 
                                    class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg">
                                Save
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
